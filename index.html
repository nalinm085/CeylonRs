<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ceylon RS | Mines Game</title>
    <script type="text/javascript" src="//www.higheffectrevenuegate.com/eb/7e/c3/eb7ec3152d1142278061482813132326.js"></script>
    <style>
        :root { --bg: #050810; --neon-blue: #00f2ff; --card: rgba(16, 22, 35, 0.85); }
        body { background: var(--bg); color: #fff; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
        .game-container { max-width: 400px; margin: auto; background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid #333; }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin: 20px 0; }
        .cell { aspect-ratio: 1; background: #1a2234; border-radius: 8px; cursor: pointer; border: 1px solid #444; }
        .btn { background: var(--neon-blue); color: #000; padding: 12px 25px; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="game-container">
    <h2>CRS MINES</h2>
    <div id="wallet">Balance: <span id="balance">100.00</span> CRS</div>
    
    <div id="banner-ad" style="margin: 15px 0;">
        <script type="text/javascript" src="//www.higheffectrevenuegate.com/5c/7f/45/5c7f4529329723329.js"></script>
    </div>

    <div class="grid" id="grid"></div>
    <button class="btn" onclick="startGame()">START GAME</button>
    <br><br>
    <a href="https://www.higheffectrevenuegate.com/d6/3d/8c/d63d8c4e4329723325.js" class="btn" style="background:#7000ff; color:white; text-decoration:none;">DAILY LUCKY SPIN (FREE CRS)</a>
</div>

<script>
    let balance = 100.00;
    function startGame() {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        for(let i=0; i<25; i++) {
            let div = document.createElement('div');
            div.className = 'cell';
            div.onclick = function() { this.style.background = '#00f2ff'; balance += 5; updateUI(); };
            grid.appendChild(div);
        }
    }
    function updateUI() { document.getElementById('balance').innerText = balance.toFixed(2); }
</script>

</body>
</html>
