<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TAPRO CRS | Professional Web3 Gaming Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #050810;
            --card: rgba(16, 22, 35, 0.85);
            --neon-blue: #00f2ff;
            --neon-purple: #7000ff;
            --text: #ffffff;
            --text-muted: #8F9BB3;
            --gold: #ffcc00;
            --success: #00ff88;
            --danger: #ff4a4a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; min-height: 100vh; -webkit-text-size-adjust: 100%; }

        .bg-glow {
            position: fixed; width: 300px; height: 300px; border-radius: 50%;
            background: radial-gradient(circle, rgba(112, 0, 255, 0.12), transparent 70%);
            filter: blur(40px); z-index: -1;
        }

        /* --- HEADER INTERFACE --- */
        .header {
            padding: 15px 20px; display: flex; justify-content: space-between; align-items: center;
            background: rgba(10, 15, 28, 0.9); border-bottom: 1px solid rgba(255,255,255,0.08);
            position: sticky; top: 0; z-index: 100; backdrop-filter: blur(10px);
        }
        .logo { font-size: 20px; font-weight: 800; letter-spacing: 2px; color: var(--neon-blue); }
        
        .header-right { display: flex; align-items: center; gap: 10px; }
        .balance-card { background: rgba(255,255,255,0.05); padding: 6px 16px; border-radius: 50px; border: 1px solid var(--neon-blue); font-size: 14px; font-weight: bold; }

        .main-grid { display: flex; flex-direction: column; gap: 15px; padding: 15px; max-width: 1200px; margin: auto; }
        .panel-card { background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .chart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }

        /* Price Tracker Box */
        .price-tracker-box {
            background: linear-gradient(135deg, rgba(0, 242, 255, 0.05), rgba(112, 0, 255, 0.02));
            border: 1px solid rgba(0, 242, 255, 0.15); border-radius: 16px; padding: 25px 20px; text-align: center; margin-top: 5px;
        }
        .price-big-text {
            font-size: 32px; font-weight: 800; color: var(--text); letter-spacing: 1px; margin: 8px 0;
            text-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
        }
        .status-badge {
            display: inline-flex; align-items: center; gap: 6px; background: rgba(0, 255, 136, 0.1);
            color: #00ff88; padding: 4px 12px; border-radius: 50px; font-size: 11px; font-weight: bold; text-transform: uppercase;
        }

        /* --- 7-DAY REWARD STREAK UI --- */
        .streak-container {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 15px;
        }
        .streak-day {
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 12px; padding: 10px 5px; text-align: center; transition: 0.3s;
        }
        .streak-day.active { border-color: var(--neon-blue); background: rgba(0, 242, 255, 0.05); }
        .streak-day.claimed { border-color: var(--success); background: rgba(0, 255, 136, 0.05); opacity: 0.7; }
        .streak-day.mega {
            grid-column: span 2; background: linear-gradient(135deg, rgba(112, 0, 255, 0.2), rgba(255, 204, 0, 0.05));
            border-color: var(--gold);
        }
        .streak-title { font-size: 11px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; }
        .streak-val { font-size: 14px; font-weight: 800; color: #fff; margin-top: 4px; display: block; }
        .streak-day.claimed .streak-val { color: var(--success); }
        .streak-day.mega .streak-val { color: var(--gold); }
        
        .claim-btn-container { margin-top: 15px; text-align: center; }

        /* Games Grid */
        .game-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; }
        .game-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01));
            padding: 25px 15px; border-radius: 18px; text-align: center; cursor: pointer;
            transition: 0.3s; border: 1px solid rgba(255,255,255,0.06);
        }
        .game-card:hover { border-color: var(--neon-blue); box-shadow: 0 0 15px rgba(0, 242, 255, 0.15); }
        .game-card i { font-size: 32px; margin-bottom: 12px; color: var(--neon-blue); }
        .game-card h4 { font-size: 14px; }

        /* Activity Feed */
        .feed-item { padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 12px; color: #ccc; }
        .feed-item b { color: var(--neon-blue); }

        /* Custom Popup Toast Notification */
        .toast-notify {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            background: linear-gradient(90deg, #00ff88, #00f2ff); color: #000;
            padding: 14px 28px; border-radius: 50px; font-weight: bold; font-size: 14px;
            box-shadow: 0 10px 25px rgba(0, 255, 136, 0.4); z-index: 10000;
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; align-items: center; gap: 8px;
        }
        .toast-notify.show { top: 25px; }
        .toast-notify.error-toast { background: linear-gradient(90deg, #ff4a4a, #ff7676); color: white; box-shadow: 0 10px 25px rgba(255, 74, 74, 0.4); }

        /* Overlay Modals */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; display: none; justify-content: center; align-items: center; }
        .modal-content { background: #101623; padding: 30px 20px; border-radius: 24px; text-align: center; max-width: 340px; width: 90%; border: 1px solid rgba(255,255,255,0.08); }

        /* Spin Wheel Dynamic */
        .wheel-container { width: 220px; height: 220px; border: 4px solid #fff; border-radius: 50%; margin: 15px auto; position: relative; transition: 4s cubic-bezier(0.1, 0.9, 0.1, 1); }
        .wheel-pointer { position: absolute; top: -8px; left: 50%; transform: translateX(-50%); width: 16px; height: 24px; background: red; clip-path: polygon(50% 100%, 0 0, 100% 0); z-index: 10; }

        .btn-action {
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple));
            color: black; border: none; padding: 12px 28px; border-radius: 50px; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 14px;
        }
        .btn-action:disabled { background: #333; color: #777; cursor: not-allowed; }

        @media (min-width: 769px) { .main-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; } }
    </style>
</head>
<body>

<div id="toast-message" class="toast-notify">
    <i id="toast-icon" class="fa-solid fa-circle-check"></i> <span id="toast-text">Reward Claimed!</span>
</div>

<div class="bg-glow" style="top: 5%; left: 5%;"></div>
<div class="bg-glow" style="bottom: 5%; right: 5%;"></div>

<div id="dashboard-screen">
    <header class="header">
        <div class="logo">TAPRO <span style="color: #fff;">CRS</span></div>
        <div class="header-right">
            <div class="balance-card">
                <i class="fa-solid fa-wallet" style="color: #00f2ff; margin-right: 6px;"></i>
                <span id="crs-balance">10.00</span> <small>CRS</small>
            </div>
        </div>
    </header>

    <div class="main-grid">
        <div class="content-left">
            <div class="panel-card">
                <div class="chart-header">
                    <h3 style="font-size: 14px; letter-spacing: 0.5px;">RS / USDT <small style="color: #888;">Tapro Realtime Price</small></h3>
                </div>
                <div class="price-tracker-box">
                    <div class="status-badge">
                        <i class="fa-solid fa-circle-nodes"></i> Verified Smart Contract Pool
                    </div>
                    <div class="price-big-text" id="node-live-price">Fetching...</div>
                    <div style="font-size: 12px; color: var(--text-muted);" id="node-24h-change">
                        Tracking smart contract liquid pools
                    </div>
                </div>
            </div>

            <div class="panel-card" style="margin-top: 15px; margin-bottom: 15px;">
                <h3 style="font-size: 15px;"><i class="fa-solid fa-calendar-check" style="color: var(--neon-blue); margin-right: 6px;"></i> 7-DAY REWARD STREAK</h3>
                <div class="streak-container">
                    <div class="streak-day" id="st-day1"><span class="streak-title">Day 1</span><span class="streak-val">+10</span></div>
                    <div class="streak-day" id="st-day2"><span class="streak-title">Day 2</span><span class="streak-val">+20</span></div>
                    <div class="streak-day" id="st-day3"><span class="streak-title">Day 3</span><span class="streak-val">+35</span></div>
                    <div class="streak-day" id="st-day4"><span class="streak-title">Day 4</span><span class="streak-val">+50</span></div>
                    <div class="streak-day" id="st-day5"><span class="streak-title">Day 5</span><span class="streak-val">+75</span></div>
                    <div class="streak-day" id="st-day6"><span class="streak-title">Day 6</span><span class="streak-val">+100</span></div>
                    <div class="streak-day mega" id="st-day7"><span class="streak-title" style="color:var(--gold);">Day 7 MEGA</span><span class="streak-val">+250</span></div>
                </div>
                <div class="claim-btn-container">
                    <button id="claim-streak-btn" class="btn-action" style="width: 100%; max-width: 200px;" onclick="claimDailyStreak()">CLAIM TODAY'S REWARD</button>
                </div>
            </div>

            <div class="game-grid">
                <div class="game-card" onclick="openGame()">
                    <i class="fa-solid fa-circle-dot"></i>
                    <h4>LUCKY SPIN</h4>
                </div>
                <div class="game-card" onclick="alert('Mines Game Launching Soon!')">
                    <i class="fa-solid fa-burst"></i>
                    <h4>CRS MINES</h4>
                </div>
                <div class="game-card" onclick="alert('Scratch Cards Launching Soon!')">
                    <i class="fa-solid fa-ticket"></i>
                    <h4>SCRATCH</h4>
                </div>
            </div>
        </div>

        <div class="panel-card" style="height: fit-content;">
            <h3 style="margin-bottom: 10px; font-size: 15px;"><i class="fa-solid fa-bolt" style="color: #00f2ff;"></i> LIVE FEED</h3>
            <div id="activity-feed"></div>
        </div>
    </div>
</div>

<div id="game-overlay" class="overlay">
    <div class="modal-content">
        <h2 style="font-size: 20px;">LUCKY SPIN</h2>
        <div style="position: relative;">
            <div class="wheel-pointer"></div>
            <canvas id="wheel-canvas" class="wheel-container" width="220" height="220"></canvas>
        </div>
        <button id="spin-btn" class="btn-action" onclick="spinWheel()">SPIN NOW</button>
        <button class="btn-action" style="background: transparent; color: #fff; border: 1px solid #444; margin-left: 5px;" onclick="closeGame()">CLOSE</button>
    </div>
</div>

<script>
    let balance = parseFloat(localStorage.getItem('web_crs_balance')) || 10.00;
    let currentStreak = parseInt(localStorage.getItem('web_crs_streak_day')) || 1;
    let lastClaimDate = localStorage.getItem('web_crs_last_claim_date') || "";

    const streakRewards = [10, 20, 35, 50, 75, 100, 250];

    window.onload = function() {
        // කෙලින්ම ඩෑෂ්බෝඩ් එක පූට් කරනවා
        document.getElementById('crs-balance').innerText = balance.toFixed(2);
        updateStreakUI();
        fetchNodePrice();
        setInterval(fetchNodePrice, 12000);
    }

    // ස්ට්‍රීක් අප්ඩේට් ඉංජිම
    function updateStreakUI() {
        for(let i = 1; i <= 7; i++) {
            let el = document.getElementById('st-day' + i);
            if(el) {
                el.classList.remove('active', 'claimed');
                if(i < currentStreak) el.classList.add('claimed');
                else if(i === currentStreak) el.classList.add('active');
            }
        }
        let todayStr = new Date().toDateString();
        let btn = document.getElementById('claim-streak-btn');
        if(lastClaimDate === todayStr) {
            btn.disabled = true;
            btn.innerText = "NEXT REWARD TOMORROW";
        } else {
            btn.disabled = false;
            btn.innerText = `CLAIM DAY ${currentStreak} REWARD`;
        }
    }

    function claimDailyStreak() {
        let todayStr = new Date().toDateString();
        if(lastClaimDate === todayStr) {
            showToast("You already claimed today's reward!", true);
            return;
        }
        let rewardAmount = streakRewards[currentStreak - 1];
        balance += rewardAmount;
        localStorage.setItem('web_crs_balance', balance);
        localStorage.setItem('web_crs_last_claim_date', todayStr);
        document.getElementById('crs-balance').innerText = balance.toFixed(2);
        showToast(`Successfully Claimed +${rewardAmount} CRS!`);
        if(currentStreak >= 7) currentStreak = 1;
        else currentStreak++;
        localStorage.setItem('web_crs_streak_day', currentStreak);
        updateStreakUI();
    }

    function showToast(text, isError = false) {
        let toast = document.getElementById('toast-message');
        let icon = document.getElementById('toast-icon');
        document.getElementById('toast-text').innerText = text;
        
        if(isError) {
            toast.classList.add('error-toast');
            icon.className = "fa-solid fa-circle-exclamation";
        } else {
            toast.classList.remove('error-toast');
            icon.className = "fa-solid fa-circle-check";
        }
        
        toast.classList.add('show');
        setTimeout(() => { toast.classList.remove('show'); }, 3500);
    }

    // ලයිව් ප්‍රයිස් ඇදීම
    async function fetchNodePrice() {
        try {
            let res = await fetch("https://api.coingecko.com/api/v3/simple/token_price/binance-smart-chain?contract_addresses=0x0d3e239e2486d3701bc25c9b986b6a22c676c12c&vs_currencies=usd&include_24hr_change=true");
            let data = await res.json();
            let tokenData = data["0x0d3e239e2486d3701bc25c9b986b6a22c676c12c"];
            if(tokenData && tokenData.usd > 0) {
                document.getElementById('node-live-price').innerText = "$" + tokenData.usd.toFixed(8);
                let change = tokenData.usd_24h_change || 0;
                let changeEl = document.getElementById('node-24h-change');
                if(change >= 0) changeEl.innerHTML = `<span style="color:#00ff88;"><i class="fa-solid fa-caret-up"></i> +${change.toFixed(2)}%</span> (24h)`;
                else changeEl.innerHTML = `<span style="color:#ff4a4a;"><i class="fa-solid fa-caret-down"></i> ${change.toFixed(2)}%</span> (24h)`;
                return;
            }
        } catch(e) {}
        let basePrice = 0.0000008412; 
        let dynamicChange = (Math.random() - 0.5) * 0.0000000030;
        let finalPrice = basePrice + dynamicChange;
        document.getElementById('node-live-price').innerText = "$" + finalPrice.toFixed(8);
        document.getElementById('node-24h-change').innerHTML = `<span style="color:#00ff88;"><i class="fa-solid fa-caret-up"></i> +1.82%</span> (Live Pool)`;
    }

    const names = ["Nalin99", "Crypto_King", "Shalu_R", "Sampath_X", "Amila_Dev"];
    setInterval(() => {
        const feeds = document.getElementById('activity-feed');
        if(!feeds) return;
        let name = names[Math.floor(Math.random() * names.length)];
        let win = (Math.random() * 20).toFixed(2);
        let div = document.createElement('div');
        div.className = 'feed-item';
        div.innerHTML = `<b>${name}</b> won <b>${win} CRS</b>`;
        feeds.prepend(div);
        if (feeds.children.length > 4) feeds.lastChild.remove();
    }, 4000);

    // ලකී ස්පින් ගේම් එක
    function openGame() { document.getElementById('game-overlay').style.display = 'flex'; drawWheel(); }
    function closeGame() { document.getElementById('game-overlay').style.display = 'none'; }
    const wheelCanvas = document.getElementById('wheel-canvas');
    const wctx = wheelCanvas.getContext('2d');
    const rewards = ["10", "0", "50", "5", "JACKPOT", "10", "20", "0"];
    const colors = ["#101623", "#1b2135", "#101623", "#1b2135", "#ffcc00", "#101623", "#1b2135", "#101623"];

    function drawWheel() {
        let angle = (2 * Math.PI) / rewards.length;
        for (let i = 0; i < rewards.length; i++) {
            wctx.beginPath(); wctx.moveTo(110, 110);
            wctx.arc(110, 110, 110, i * angle, (i + 1) * angle);
            wctx.fillStyle = colors[i]; wctx.fill();
            wctx.save(); wctx.translate(110, 110); wctx.rotate(i * angle + angle / 2);
            wctx.fillStyle = colors[i] === "#ffcc00" ? "#000" : "#fff";
            wctx.font = "bold 11px Arial"; wctx.fillText(rewards[i], 60, 4); wctx.restore();
        }
    }

    let rotation = 0;
    function spinWheel() {
        let btn = document.getElementById('spin-btn'); btn.disabled = true;
        rotation += Math.floor(Math.random() * 360) + 1800;
        wheelCanvas.style.transform = `rotate(${rotation}deg)`;
        setTimeout(() => {
            btn.disabled = false;
            let win = Math.floor(Math.random() * 25);
            balance += win;
            localStorage.setItem('web_crs_balance', balance);
            document.getElementById('crs-balance').innerText = balance.toFixed(2);
            showToast(`Lucky Spin Won +${win} CRS!`);
        }, 4000);
    }
</script>
</body>
</html>
