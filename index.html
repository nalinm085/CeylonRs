<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ceylon RS v1.1</title>

<style>
body{
margin:0;
font-family:Arial;
background:#050810;
color:white;
}

header{
display:flex;
justify-content:space-between;
padding:15px;
background:#101623;
position:sticky;
top:0;
}

.card{
background:#101623;
margin:15px;
padding:15px;
border-radius:15px;
}

button{
padding:10px;
border:none;
border-radius:10px;
background:linear-gradient(90deg,#00f2ff,#7000ff);
color:black;
font-weight:bold;
}

/* SPIN WHEEL */
#wheel{
width:200px;
height:200px;
border-radius:50%;
border:5px solid white;
margin:auto;
transition:4s;
display:flex;
align-items:center;
justify-content:center;
}

.center{
text-align:center;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
}

.box{
background:#0d1422;
padding:15px;
border-radius:10px;
text-align:center;
cursor:pointer;
}
</style>
</head>

<body>

<header>
<h3>CEYLON RS</h3>
<div>💰 <span id="bal">10</span></div>
</header>

<div class="card center">
<h4>Lucky Spin</h4>
<div id="wheel">SPIN</div>
<br>
<button onclick="spin()">SPIN NOW</button>
</div>

<div class="card">
<h4>Games</h4>
<div class="grid">
<div class="box">🎯 Mines</div>
<div class="box">🎟 Scratch</div>
<div class="box" onclick="reward()">🎁 Bonus</div>
<div class="box">👥 Referral</div>
</div>
</div>

<div class="card">
<h4>Referral Link</h4>
<p id="ref"></p>
</div>

<!-- AD SPACE -->
<div class="card center">
<p>Ad Banner 300x250</p>
</div>

<script>

let bal=10;
let rotation=0;

/* LOGIN AUTO */
window.onload=()=>{
document.getElementById("ref").innerText=
window.location.href+"?ref=ceylonrs";
}

/* BONUS */
function reward(){
bal+=5;
document.getElementById("bal").innerText=bal;
}

/* SPIN WHEEL */
function spin(){
let win=Math.floor(Math.random()*30);
rotation += 1800 + Math.random()*360;

document.getElementById("wheel").style.transform="rotate("+rotation+"deg)";

setTimeout(()=>{
bal+=win;
document.getElementById("bal").innerText=bal;
alert("You won "+win+" CRS");
},4000);
}

</script>

</body>
</html>
