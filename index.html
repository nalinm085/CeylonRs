<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ceylon RS | Monetized Platform</title>

<style>
body{
margin:0;
font-family:Arial;
background:#050810;
color:white;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
padding:15px;
background:#101623;
position:sticky;
top:0;
z-index:100;
}

/* WALLET */
.wallet{
margin:15px;
padding:20px;
border-radius:15px;
background:#101623;
box-shadow:0 0 15px rgba(0,255,255,0.08);
}

.balance{
font-size:24px;
color:#00f2ff;
font-weight:bold;
}

/* BUTTON */
button{
padding:12px;
border:none;
border-radius:10px;
background:linear-gradient(90deg,#00f2ff,#7000ff);
color:black;
font-weight:bold;
cursor:pointer;
width:100%;
margin-top:10px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
margin:15px;
}

.box{
background:#0d1422;
padding:15px;
border-radius:12px;
text-align:center;
cursor:pointer;
}

/* LOGIN */
#login{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.login-box{
background:#101623;
padding:25px;
border-radius:15px;
width:85%;
max-width:350px;
}

input{
width:100%;
padding:12px;
margin:8px 0;
border:none;
border-radius:10px;
}

/* SOCIAL BAR */
.social-bar{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#111827;
padding:10px;
text-align:center;
font-size:12px;
}

.center{text-align:center;}

.ad-box{
margin:15px;
padding:20px;
background:#101623;
border-radius:15px;
text-align:center;
border:1px solid rgba(255,255,255,0.05);
}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<div class="login-box">
<h3>CEYLON RS LOGIN</h3>
<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">ENTER DASHBOARD</button>
</div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none;">

<header>
<h3>CEYLON RS</h3>
<div>💰 <span id="bal">10</span></div>
</header>

<!-- WALLET -->
<div class="wallet">
<div>Available Balance</div>
<div class="balance" id="balance">10 CRS</div>
</div>

<!-- ACTIONS -->
<div class="grid">
<div class="box" onclick="spin()">🎡 Spin</div>
<div class="box" onclick="bonus()">🎁 Bonus</div>
<div class="box">🎯 Mines</div>
<div class="box">🎟 Scratch</div>
</div>

<!-- REF -->
<div class="wallet">
<h4>Referral Link</h4>
<p id="ref"></p>
</div>

<!-- AD BANNER ZONE -->
<div class="ad-box">
<p>📢 Adsterra Banner (300x250)</p>
</div>

<!-- SMARTLINK ZONE -->
<div class="ad-box">
<p>⚡ Smartlink Zone (High CPM)</p>
<button onclick="openAd()">Open Offer</button>
</div>

<!-- SOCIAL BAR -->
<div class="social-bar">
⚡ Adsterra Social Bar Active Zone
</div>

</div>

<script>

let bal = 10;

/* LOGIN */
function login(){
let email = document.getElementById("email").value;
let pass = document.getElementById("pass").value;

if(email=="" || pass==""){
alert("Fill all fields");
return;
}

document.getElementById("login").style.display="none";
document.getElementById("dashboard").style.display="block";

init();
}

/* INIT */
function init(){
document.getElementById("ref").innerText =
window.location.href + "?ref=ceylonrs";
}

/* BONUS (MONETIZATION CORE) */
function bonus(){

window.open("https://www.profitableratecpm.com/29723325","_blank");

setTimeout(()=>{
bal += 12;
update();
alert("🎁 Bonus +12 CRS added");
},7000);
}

/* SPIN SYSTEM */
function spin(){
let win = Math.floor(Math.random()*25);

setTimeout(()=>{
bal += win;
update();
alert("You won " + win + " CRS");
},3000);
}

/* SMARTLINK */
function openAd(){
window.open("https://www.profitableratecpm.com/29723325","_blank");
}

/* UPDATE UI */
function update(){
document.getElementById("bal").innerText = bal;
document.getElementById("balance").innerText = bal + " CRS";
}

</script>

</body>
</html>
