<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ceylon RS v1.7</title>

<style>
body{
margin:0;
font-family:Arial;
background:#050810;
color:white;
}

/* LOGIN */
#login{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}

.login-box{
background:#101623;
padding:25px;
border-radius:15px;
width:85%;
max-width:350px;
}

input{
width:100%;
padding:12px;
margin:8px 0;
border:none;
border-radius:10px;
outline:none;
}

button{
padding:10px;
border:none;
border-radius:10px;
background:linear-gradient(90deg,#00f2ff,#7000ff);
color:black;
font-weight:bold;
cursor:pointer;
width:100%;
margin-top:10px;
}

/* DASHBOARD */
#dashboard{
display:none;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
padding:15px;
background:#101623;
position:sticky;
top:0;
}

/* CARDS */
.card{
background:#101623;
margin:15px;
padding:15px;
border-radius:15px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
margin:15px;
}

.box{
background:#0d1422;
padding:15px;
border-radius:10px;
text-align:center;
cursor:pointer;
}

/* SOCIAL BAR */
.social-bar{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#111827;
padding:10px;
font-size:12px;
text-align:center;
}

/* BALANCE */
.balance{
font-size:22px;
color:#00f2ff;
font-weight:bold;
}

.center{text-align:center;}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<div class="login-box">
<h3>CEYLON RS LOGIN</h3>
<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">ENTER</button>
</div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

<header>
<h3>CEYLON RS</h3>
<div>💰 <span id="bal">10</span></div>
</header>

<div class="card center">
<div class="balance" id="balance">10 CRS</div>
</div>

<div class="grid">
<div class="box" onclick="spin()">🎡 Spin</div>
<div class="box" onclick="bonus()">🎁 Bonus</div>
<div class="box">🎯 Mines</div>
<div class="box">🎟 Scratch</div>
</div>

<div class="card">
<h4>Referral Link</h4>
<p id="ref"></p>
</div>

<div class="card center">
<p>Ad Banner (300x250)</p>
</div>

<div class="social-bar">
⚡ Adsterra Social Bar Active Zone
</div>

</div>

<script>

let bal = 10;
let logged = false;

/* LOGIN */
function login(){

let email = document.getElementById("email").value;
let pass = document.getElementById("pass").value;

if(email=="" || pass==""){
alert("Fill all fields");
return;
}

logged = true;
localStorage.setItem("logged","yes");

document.getElementById("login").style.display="none";
document.getElementById("dashboard").style.display="block";

init();
}

/* INIT */
function init(){

document.getElementById("ref").innerText =
window.location.href+"?ref=ceylonrs";

}

/* BONUS → SMARTLINK (MONETIZATION CORE) */
function bonus(){

window.open("https://www.profitableratecpm.com/29723325","_blank");

// reward after engagement simulation
setTimeout(()=>{
bal += 12;
update();
alert("🎁 Bonus Added +12 CRS");
},7000);

}

/* SPIN */
function spin(){

let win = Math.floor(Math.random()*25);

setTimeout(()=>{
bal += win;
update();
alert("You won "+win+" CRS");
},3000);
}

/* UPDATE */
function update(){
document.getElementById("bal").innerText = bal;
document.getElementById("balance").innerText = bal+" CRS";
}

</script>

</body>
</html>
