<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ceylon RS v1.5</title>

<style>
body{
margin:0;
font-family:Arial;
background:#050810;
color:white;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
padding:15px;
background:#101623;
position:sticky;
top:0;
}

/* CARD */
.card{
background:#101623;
margin:15px;
padding:15px;
border-radius:15px;
}

/* BUTTON */
button{
padding:10px;
border:none;
border-radius:10px;
background:linear-gradient(90deg,#00f2ff,#7000ff);
color:black;
font-weight:bold;
cursor:pointer;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
}

.box{
background:#0d1422;
padding:15px;
border-radius:10px;
text-align:center;
cursor:pointer;
transition:0.3s;
}
.box:hover{transform:scale(1.05);}

/* WHEEL */
#wheel{
width:180px;
height:180px;
border-radius:50%;
border:5px solid #00f2ff;
margin:auto;
display:flex;
align-items:center;
justify-content:center;
transition:4s cubic-bezier(0.1,0.7,0.1,1);
}

/* SOCIAL BAR */
.social-bar{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#111827;
text-align:center;
padding:10px;
font-size:12px;
z-index:999;
}

.center{text-align:center;}
</style>
</head>

<body>

<header>
<h3>CEYLON RS</h3>
<div>💰 <span id="bal">10</span></div>
</header>

<!-- SPIN -->
<div class="card center">
<h3>Lucky Spin</h3>
<div id="wheel">SPIN</div>
<br>
<button onclick="spin()">SPIN NOW</button>
</div>

<!-- GAMES -->
<div class="card">
<h3>Games</h3>
<div class="grid">
<div class="box">🎯 Mines</div>
<div class="box">🎟 Scratch</div>
<div class="box" onclick="bonus()">🎁 Bonus (Ad Reward)</div>
<div class="box">👥 Referral</div>
</div>
</div>

<!-- REF -->
<div class="card">
<h3>Referral Link</h3>
<p id="ref"></p>
</div>

<!-- AD SPACE -->
<div class="card center">
<p>Ad Banner (300x250)</p>
</div>

<!-- SOCIAL BAR PLACEHOLDER -->
<div class="social-bar">
⚡ Adsterra Social Bar Active Zone
</div>

<script>

let bal=10;
let rotation=0;

/* REF SYSTEM */
let urlParams=new URLSearchParams(window.location.search);
let ref=urlParams.get("ref");

/* INIT */
window.onload=()=>{
document.getElementById("ref").innerText=
window.location.href+"?ref=ceylonrs";

checkReferral();
}

/* 🔥 AD-BASED BONUS SYSTEM */
function bonus(){

// STEP 1: OPEN AD (SMARTLINK)
let adWindow = window.open("https://www.profitableratecpm.com/29723325","_blank");

// STEP 2: WAIT TIME (simulate ad engagement)
setTimeout(()=>{
bal += 15;
document.getElementById("bal").innerText=bal;
alert("🎁 Ad Reward Added +15 CRS");
},8000);

}

/* REFERRAL CHECK (LOGIN STYLE SIMULATION) */
function checkReferral(){
if(ref && !localStorage.getItem("ref_done")){
bal += 20;
localStorage.setItem("ref_done","yes");
alert("Referral Bonus +20 CRS from "+ref);
}
}

/* SPIN */
function spin(){
let win=Math.floor(Math.random()*30);

rotation+=1800+Math.random()*360;

document.getElementById("wheel").style.transform=
"rotate("+rotation+"deg)";

setTimeout(()=>{
bal+=win;
document.getElementById("bal").innerText=bal;
alert("You won "+win+" CRS");
},4000);
}

</script>

</body>
</html>
