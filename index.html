<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAPRO CRS Hub | Professional Gaming</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #050810; --primary: #00f2ff; --secondary: #7000ff; --text: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; }
        .dashboard { max-width: 800px; margin: 20px auto; padding: 20px; background: #0c101d; border-radius: 20px; }
        .stat-box { display: flex; justify-content: space-between; padding: 20px; background: #161b2d; border-radius: 15px; margin-bottom: 20px; }
        .game-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .btn { padding: 15px; border-radius: 10px; border: none; cursor: pointer; background: linear-gradient(90deg, var(--primary), var(--secondary)); color: white; font-weight: bold; }
        
        /* Scratch Animation */
        .scratch-row { display: flex; gap: 10px; justify-content: center; }
        .card { width: 100px; height: 140px; background: #1e2538; border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.5s; font-size: 24px; border: 2px solid #333; }
        .card.revealed { transform: rotateY(180deg); background: var(--secondary); }
    </style>
</head>
<body>

<div class="dashboard">
    <h1>TAPRO CRS HUB</h1>
    <div class="stat-box">
        <div>Balance: <span id="balance">1000</span> CRS</div>
        <div>SOL Live: <span id="sol-price">$0.00</span></div>
    </div>

    <div class="game-grid">
        <div>
            <h3>Lucky Matrix</h3>
            <div id="matrix-val" style="font-size: 2em; color: var(--primary);">0 CRS</div>
            <button class="btn" onclick="spinMatrix()">SPIN NOW</button>
        </div>

        <div>
            <h3>Scratch & Win</h3>
            <div class="scratch-row" id="scratch-container">
                <div class="card" onclick="scratch(0)">?</div>
                <div class="card" onclick="scratch(1)">?</div>
                <div class="card" onclick="scratch(2)">?</div>
            </div>
        </div>
    </div>
</div>

<script>
    let balance = 1000;
    
    // Live Price Simulation
    setInterval(() => {
        let price = (140 + Math.random() * 5).toFixed(2);
        document.getElementById('sol-price').innerText = "$" + price;
    }, 2000);

    // Matrix Logic
    function spinMatrix() {
        let prize = [50, 100, 200, 0, 0][Math.floor(Math.random()*5)];
        document.getElementById('matrix-val').innerText = prize + " CRS";
        balance += prize;
        document.getElementById('balance').innerText = balance;
    }

    // Scratch Logic
    function scratch(id) {
        let cards = document.querySelectorAll('.card');
        let win = Math.floor(Math.random() * 3);
        cards.forEach((c, i) => {
            c.classList.add('revealed');
            c.innerText = (i === win) ? "500" : "X";
        });
        if(id === win) {
            balance += 500;
            document.getElementById('balance').innerText = balance;
            alert("JACKPOT! You won 500 CRS");
        } else {
            alert("Try again!");
        }
    }
</script>

</body>
</html>
